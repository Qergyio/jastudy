<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스터디 체크</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
padding:20px;
width:400px;
margin:auto;
margin-top:40px;
border-radius:10px;
}

button,input{
padding:8px;
margin:5px;
}

.task{
display:flex;
justify-content:space-between;
margin:5px;
}

</style>
</head>

<body>

<div class="box" id="loginBox">

<h2>스터디 로그인</h2>

<input id="id" placeholder="학번">
<input id="pw" type="password" placeholder="비밀번호">

<button onclick="login()">로그인</button>

</div>

<div class="box" id="mainBox" style="display:none">

<h2>스터디 과제</h2>

<input id="subject" placeholder="과목">
<input id="task" placeholder="과제">

<button onclick="addTask()">추가</button>

<div id="tasks"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "여기에Firebase코드",
authDomain: "여기에Firebase코드",
projectId: "여기에Firebase코드",
storageBucket: "여기에Firebase코드",
messagingSenderId: "여기에Firebase코드",
appId: "여기에Firebase코드"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USERS = [
{id:"23001",name:"김지아",pw:"1111"},
{id:"23002",name:"민수",pw:"1111"},
{id:"23003",name:"서윤",pw:"1111"},
{id:"23004",name:"하린",pw:"1111"},
{id:"23005",name:"지훈",pw:"1111"}
]

let currentUser=""

window.login=function(){

let id=document.getElementById("id").value
let pw=document.getElementById("pw").value

let user=USERS.find(u=>u.id===id && u.pw===pw)

if(user){

currentUser=user.name

document.getElementById("loginBox").style.display="none"
document.getElementById("mainBox").style.display="block"

loadTasks()

}else{

alert("로그인 실패")

}

}

window.addTask=async function(){

let subject=document.getElementById("subject").value
let task=document.getElementById("task").value

await addDoc(collection(db,"tasks"),{
subject:subject,
task:task,
checkedBy:""
})

}

function loadTasks(){

onSnapshot(collection(db,"tasks"),(snapshot)=>{

let html=""

snapshot.forEach(doc=>{

let d=doc.data()

html+=`
<div class="task">
<span>${d.subject} : ${d.task}</span>
<button onclick="check('${doc.id}')">검사</button>
</div>
`

})

document.getElementById("tasks").innerHTML=html

})

}

window.check=function(id){

alert(currentUser+" 검사 완료")

}

</script>

</body>
</html>

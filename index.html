<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디 체크 Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px; /* 모바일~태블릿 최적화 사이즈 */
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            margin-bottom: 20px;
        }

        h2 { margin-top: 0; color: var(--text-main); }
        
        .input-group { margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        /* 메인 화면 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logout-btn {
            background-color: #EF4444;
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }
        .logout-btn:hover { background-color: #DC2626; }

        /* 과제 목록 스타일 */
        .subject-group {
            margin-top: 25px;
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .subject-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
        }

        .task-link {
            font-size: 13px;
            color: #3B82F6;
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }
        .task-link:hover { text-decoration: underline; }

        .check-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        .check-btn.checked {
            background-color: #10B981;
        }

        /* 진행률 바 */
        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 99px;
            height: 8px;
            margin-top: 15px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: #10B981;
            transition: width 0.3s ease;
        }

        /* 검사한 사람 태그 */
        .checker-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .checker-badge {
            background: #E0E7FF;
            color: var(--primary);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 99px;
            font-weight: 500;
        }

        .empty-badge {
            background: #F3F4F6;
            color: var(--text-muted);
        }

        /* 숨김 처리 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="loginBox">
        <h2 style="text-align: center; margin-bottom: 20px;">스터디 로그인</h2>
        <input id="loginId" type="text" placeholder="학번 (예: 23001)" autocomplete="off">
        <input id="loginPw" type="password" placeholder="비밀번호 (1111)">
        <button onclick="login()">로그인</button>
    </div>

    <div id="mainBox" class="hidden">
        <div class="header">
            <h2 style="margin: 0;">환영합니다, <span id="userNameDisplay" style="color: var(--primary);"></span>님!</h2>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="card">
            <h3>새 과제 추가</h3>
            <div style="display: flex; gap: 10px;">
                <input id="subject" placeholder="과목 (예: 수학)" style="width: 40%;">
                <input id="task" placeholder="과제 내용 (예: 미적분 20문제)" style="width: 60%;">
            </div>
            <input id="link" placeholder="참고 자료 링크 (선택사항, URL 입력)">
            <button onclick="addTask()">과제 등록하기</button>
        </div>

        <div id="tasksContainer">
            </div>
    </div>
</div>

<script>
    const USERS = [
        {id:"23001", name:"김지아", pw:"1111"},
        {id:"23002", name:"민수", pw:"1111"},
        {id:"23003", name:"서윤", pw:"1111"},
        {id:"23004", name:"하린", pw:"1111"},
        {id:"23005", name:"지훈", pw:"1111"}
    ];
    
    const TOTAL_MEMBERS = USERS.length;
    let currentUser = "";
    
    // 로컬 스토리지에서 데이터 불러오기 (고유 ID 추가)
    let tasks = JSON.parse(localStorage.getItem("studyTasks") || "[]");

    // 앱 시작 시 로그인 상태 확인
    window.onload = () => {
        const savedUser = localStorage.getItem("currentUser");
        if(savedUser) {
            currentUser = savedUser;
            showMain();
        }
    };

    function login() {
        let id = document.getElementById("loginId").value;
        let pw = document.getElementById("loginPw").value;

        let user = USERS.find(u => u.id === id && u.pw === pw);

        if(user) {
            currentUser = user.name;
            localStorage.setItem("currentUser", currentUser);
            showMain();
        } else {
            alert("학번이나 비밀번호가 틀렸습니다. (예: 23001 / 1111)");
        }
    }

    function logout() {
        currentUser = "";
        localStorage.removeItem("currentUser");
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("mainBox").classList.add("hidden");
        document.getElementById("loginId").value = "";
        document.getElementById("loginPw").value = "";
    }

    function showMain() {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("mainBox").classList.remove("hidden");
        document.getElementById("userNameDisplay").innerText = currentUser;
        render();
    }

    function addTask() {
        let subject = document.getElementById("subject").value.trim();
        let task = document.getElementById("task").value.trim();
        let link = document.getElementById("link").value.trim();

        if(!subject || !task) {
            alert("과목과 과제 내용은 필수입니다!");
            return;
        }

        tasks.push({
            id: Date.now(), // 고유 ID 부여
            subject: subject,
            task: task,
            link: link,
            checkedBy: []
        });

        // 입력창 초기화
        document.getElementById("subject").value = "";
        document.getElementById("task").value = "";
        document.getElementById("link").value = "";

        save();
        render();
    }

    function toggleCheck(taskId) {
        let taskIndex = tasks.findIndex(t => t.id === taskId);
        if(taskIndex === -1) return;

        let task = tasks[taskIndex];
        
        if(!task.checkedBy.includes(currentUser)) {
            task.checkedBy.push(currentUser); // 검사 완료
        } else {
            task.checkedBy = task.checkedBy.filter(n => n !== currentUser); // 검사 취소
        }

        save();
        render();
    }

    function deleteTask(taskId) {
        if(confirm("이 과제를 삭제할까요?")) {
            tasks = tasks.filter(t => t.id !== taskId);
            save();
            render();
        }
    }

    function save() {
        localStorage.setItem("studyTasks", JSON.stringify(tasks));
    }

    function render() {
        let container = document.getElementById("tasksContainer");
        container.innerHTML = "";

        if(tasks.length === 0) {
            container.innerHTML = `<div class="card" style="text-align:center; color:gray;">등록된 과제가 없습니다.</div>`;
            return;
        }

        // 과목별로 데이터 묶기 (Grouping)
        let groupedTasks = tasks.reduce((acc, task) => {
            if (!acc[task.subject]) acc[task.subject] = [];
            acc[task.subject].push(task);
            return acc;
        }, {});

        // 과목별로 렌더링
        for (let subject in groupedTasks) {
            let subjectHtml = `<div class="subject-group">
                                <div class="subject-title">
                                    <span>📘 ${subject}</span>
                                </div>`;
            
            groupedTasks[subject].forEach(t => {
                let isChecked = t.checkedBy.includes(currentUser);
                let progressPercent = (t.checkedBy.length / TOTAL_MEMBERS) * 100;
                
                // 링크가 있으면 a 태그 생성
                let linkHtml = t.link ? `<a href="${t.link.startsWith('http') ? t.link : 'http://'+t.link}" target="_blank" class="task-link">🔗 참고 자료 링크</a>` : '';

                // 검사한 사람 뱃지 만들기
                let badgesHtml = t.checkedBy.map(name => `<span class="checker-badge">${name}</span>`).join('');
                if(t.checkedBy.length === 0) badgesHtml = `<span class="checker-badge empty-badge">아직 검사한 사람이 없어요</span>`;

                subjectHtml += `
                    <div class="task-item">
                        <div class="task-header">
                            <div>
                                <div class="task-title">${t.task}</div>
                                ${linkHtml}
                            </div>
                            <button class="check-btn ${isChecked ? 'checked' : ''}" onclick="toggleCheck(${t.id})">
                                ${isChecked ? '✅ 검사완료' : '⬜ 검사하기'}
                            </button>
                        </div>
                        
                        <div style="font-size: 12px; color: gray; margin-top: 10px;">
                            진행률: ${t.checkedBy.length} / ${TOTAL_MEMBERS} 명 (${progressPercent}%)
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progressPercent}%;"></div>
                        </div>

                        <div class="checker-list">
                            ${badgesHtml}
                        </div>
                        
                        <div style="text-align: right; margin-top: 10px;">
                            <button style="background:none; color:#EF4444; width:auto; padding:0; font-size:12px;" onclick="deleteTask(${t.id})">🗑️ 삭제</button>
                        </div>
                    </div>
                `;
            });

            subjectHtml += `</div>`;
            container.innerHTML += subjectHtml;
        }
    }
</script>

</body>
</html>

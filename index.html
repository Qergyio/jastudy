<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디 체크 Pro V3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }

        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 30px; margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: var(--text-main); }
        
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 10px; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
        button:hover { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-secondary:hover { background-color: #EEF2FF; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logout-btn { background-color: #EF4444; width: auto; padding: 8px 16px; font-size: 14px; margin: 0; }
        
        /* 탭 메뉴 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: var(--border); color: var(--text-muted); border-radius: 8px; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 과제 및 통계 리스트 */
        .subject-group { margin-top: 25px; background: #F9FAFB; border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        .subject-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .task-item { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .task-title { font-size: 16px; font-weight: 600; }
        
        .check-btn { width: auto; padding: 6px 12px; font-size: 13px; border-radius: 6px; margin: 0; }
        .check-btn.checked { background-color: #10B981; }

        .checker-badge { background: #E0E7FF; color: var(--primary); font-size: 12px; padding: 4px 10px; border-radius: 99px; font-weight: 500; display: inline-block; margin-right: 5px; margin-top: 5px; }
        
        /* 통계(History) 전용 스타일 */
        .history-date { font-size: 20px; font-weight: bold; border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-top: 30px; margin-bottom: 15px; color: var(--text-main); }
        .stats-box { background: #EEF2FF; border-radius: 8px; padding: 15px; margin-bottom: 15px; font-size: 14px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .stats-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="loginBox">
        <h2 style="text-align: center; margin-bottom: 20px;">스터디 로그인</h2>
        <input id="loginId" type="text" placeholder="학번 (예: 1101)">
        <input id="loginPw" type="password" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <button class="btn-secondary" onclick="showSignup()">새로 오셨나요? 회원가입</button>
    </div>

    <div class="card hidden" id="signupBox">
        <h2 style="text-align: center; margin-bottom: 20px;">스터디 회원가입</h2>
        <input id="signupName" type="text" placeholder="이름 (예: 홍길동)">
        <input id="signupId" type="text" placeholder="학번 (예: 1101)">
        <input id="signupPw" type="password" placeholder="비밀번호">
        <button onclick="registerUser()">가입하기</button>
        <button class="btn-secondary" onclick="showLogin()">돌아가기</button>
    </div>

    <div id="mainBox" class="hidden">
        <div class="header">
            <h2 style="margin: 0;"><span id="userNameDisplay" style="color: var(--primary);"></span>님, 환영합니다!</h2>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="tabs">
            <div class="tab-btn active" id="tabToday" onclick="switchTab('today')">📝 오늘의 과제</div>
            <div class="tab-btn" id="tabHistory" onclick="switchTab('history')">📊 과거 기록 및 통계</div>
        </div>

        <div id="viewToday">
            <div class="card">
                <h3>새 과제 추가</h3>
                <div style="display: flex; gap: 10px;">
                    <input id="subject" placeholder="과목 (예: 화학)" style="width: 30%;">
                    <input id="task" placeholder="과제 내용 (예: 주기율표 암기)" style="width: 70%;">
                </div>
                <input id="taskDate" type="date">
                <button onclick="addTask()">과제 등록하기</button>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div id="viewHistory" class="hidden">
            <div class="card" style="background: #FFFBEB;">
                <h3>💡 통계 시스템 안내</h3>
                <p style="font-size: 14px; color: #555;">날짜별로 누가 어떤 과목을 완수했는지, 팀 전체의 달성률은 몇 퍼센트인지 산출된 기록을 확인합니다.</p>
                <button class="btn-secondary" onclick="exportData()">📥 전체 데이터 엑셀(CSV) 다운로드</button>
            </div>
            <div id="historyContainer"></div>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("studyUsers") || "[]");
    let tasks = JSON.parse(localStorage.getItem("studyTasks") || "[]");
    let currentUser = "";

    window.onload = () => {
        // 오늘 날짜 세팅
        document.getElementById("taskDate").value = new Date().toISOString().split('T')[0];
        
        const savedUser = localStorage.getItem("currentUser");
        if(savedUser) {
            currentUser = savedUser;
            showMain();
        }
    };

    function showSignup() { document.getElementById("loginBox").classList.add("hidden"); document.getElementById("signupBox").classList.remove("hidden"); }
    function showLogin() { document.getElementById("signupBox").classList.add("hidden"); document.getElementById("loginBox").classList.remove("hidden"); }

    function registerUser() {
        let name = document.getElementById("signupName").value.trim();
        let id = document.getElementById("signupId").value.trim();
        let pw = document.getElementById("signupPw").value.trim();

        if(!name || !id || !pw) return alert("모두 입력해주세요!");
        if(users.some(u => u.id === id)) return alert("이미 가입된 학번입니다!");

        users.push({ id: id, name: name, pw: pw });
        localStorage.setItem("studyUsers", JSON.stringify(users));
        alert(`${name}님 가입 완료! 로그인해주세요.`);
        showLogin();
    }

    function login() {
        let id = document.getElementById("loginId").value.trim();
        let pw = document.getElementById("loginPw").value.trim();
        let user = users.find(u => u.id === id && u.pw === pw);

        if(user) {
            currentUser = user.name;
            localStorage.setItem("currentUser", currentUser);
            showMain();
        } else {
            alert("학번이나 비밀번호가 틀렸습니다.");
        }
    }

    function logout() {
        currentUser = "";
        localStorage.removeItem("currentUser");
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("mainBox").classList.add("hidden");
    }

    function showMain() {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("mainBox").classList.remove("hidden");
        document.getElementById("userNameDisplay").innerText = currentUser;
        renderToday();
    }

    function switchTab(tab) {
        if(tab === 'today') {
            document.getElementById("tabToday").classList.add("active");
            document.getElementById("tabHistory").classList.remove("active");
            document.getElementById("viewToday").classList.remove("hidden");
            document.getElementById("viewHistory").classList.add("hidden");
            renderToday();
        } else {
            document.getElementById("tabHistory").classList.add("active");
            document.getElementById("tabToday").classList.remove("active");
            document.getElementById("viewHistory").classList.remove("hidden");
            document.getElementById("viewToday").classList.add("hidden");
            renderHistory();
        }
    }

    function addTask() {
        let subject = document.getElementById("subject").value.trim();
        let task = document.getElementById("task").value.trim();
        let date = document.getElementById("taskDate").value;

        if(!subject || !task || !date) return alert("과목, 과제 내용, 날짜를 모두 입력하세요!");

        tasks.push({
            id: Date.now(),
            date: date, // 날짜 데이터 추가
            subject: subject,
            task: task,
            checkedBy: []
        });

        document.getElementById("subject").value = "";
        document.getElementById("task").value = "";
        save();
        renderToday();
    }

    function toggleCheck(taskId) {
        let taskIndex = tasks.findIndex(t => t.id === taskId);
        if(taskIndex === -1) return;

        let task = tasks[taskIndex];
        if(!task.checkedBy.includes(currentUser)) {
            task.checkedBy.push(currentUser);
        } else {
            task.checkedBy = task.checkedBy.filter(n => n !== currentUser);
        }
        save();
        renderToday();
    }

    function save() { localStorage.setItem("studyTasks", JSON.stringify(tasks)); }

    // 오늘의 과제 렌더링 (선택된 날짜가 '오늘'인 것만 표시)
    function renderToday() {
        let container = document.getElementById("tasksContainer");
        container.innerHTML = "";
        
        let today = new Date().toISOString().split('T')[0];
        let todayTasks = tasks.filter(t => t.date === today);

        if(todayTasks.length === 0) {
            container.innerHTML = `<div class="card" style="text-align:center; color:gray;">오늘 등록된 과제가 없습니다.</div>`;
            return;
        }

        let grouped = todayTasks.reduce((acc, task) => {
            if (!acc[task.subject]) acc[task.subject] = [];
            acc[task.subject].push(task);
            return acc;
        }, {});

        for (let subject in grouped) {
            let html = `<div class="subject-group"><div class="subject-title"><span>📘 ${subject}</span></div>`;
            grouped[subject].forEach(t => {
                let isChecked = t.checkedBy.includes(currentUser);
                let badgesHtml = t.checkedBy.map(name => `<span class="checker-badge">${name}</span>`).join('');
                if(t.checkedBy.length === 0) badgesHtml = `<span class="checker-badge" style="background:#F3F4F6; color:gray;">미검사</span>`;

                html += `
                    <div class="task-item">
                        <div class="task-header">
                            <div class="task-title">${t.task}</div>
                            <button class="check-btn ${isChecked ? 'checked' : ''}" onclick="toggleCheck(${t.id})">
                                ${isChecked ? '✅ 완료' : '⬜ 체크'}
                            </button>
                        </div>
                        <div style="margin-top: 10px;">${badgesHtml}</div>
                    </div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    // 기록 및 통계 렌더링
    function renderHistory() {
        let container = document.getElementById("historyContainer");
        container.innerHTML = "";

        if(tasks.length === 0) {
            container.innerHTML = `<div class="card" style="text-align:center; color:gray;">아직 쌓인 기록이 없습니다.</div>`;
            return;
        }

        // 1. 날짜별로 그룹화 (최신순 정렬)
        let groupedByDate = tasks.reduce((acc, task) => {
            if (!acc[task.date]) acc[task.date] = [];
            acc[task.date].push(task);
            return acc;
        }, {});

        let sortedDates = Object.keys(groupedByDate).sort((a, b) => new Date(b) - new Date(a));
        let totalUsers = users.length > 0 ? users.length : 1;

        sortedDates.forEach(date => {
            let dayTasks = groupedByDate[date];
            let totalPossibleChecks = dayTasks.length * totalUsers;
            let actualChecks = dayTasks.reduce((sum, t) => sum + t.checkedBy.length, 0);
            let dayProgress = Math.round((actualChecks / totalPossibleChecks) * 100) || 0;

            // 누가 어떤 과목을 했는지 분석
            let userStats = {};
            users.forEach(u => userStats[u.name] = []);
            
            dayTasks.forEach(t => {
                t.checkedBy.forEach(userName => {
                    if(!userStats[userName].includes(t.subject)) {
                        userStats[userName].push(t.subject);
                    }
                });
            });

            let statsHtml = `<div class="stats-box">
                                <strong style="color:var(--primary);">📈 팀 전체 달성률: ${dayProgress}%</strong><br><br>`;
            
            for(let userName in userStats) {
                let subjectsDone = userStats[userName].length > 0 ? userStats[userName].join(", ") : "완료 없음";
                statsHtml += `<div class="stats-row"><span>👤 ${userName}</span> <span>${subjectsDone}</span></div>`;
            }
            statsHtml += `</div>`;

            let html = `<div class="history-date">📅 ${date}</div>` + statsHtml;
            container.innerHTML += html;
        });
    }

    // 데이터 엑셀(CSV) 외부 저장 기능
    function exportData() {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "날짜,과목,과제내용,완료한사람\n"; // 헤더

        tasks.forEach(t => {
            let row = `${t.date},${t.subject},${t.task},"${t.checkedBy.join(', ')}"`;
            csvContent += row + "\n";
        });

        var encodedUri = encodeURI(csvContent);
        var link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "스터디기록_데이터.csv");
        document.body.appendChild(link);
        link.click();
    }
</script>

</body>
</html>
